name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"
  AWS_REGION: "ap-south-1"

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy
    needs: [lint-and-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Step 1: Deploy infra WITHOUT App Runner (ECR, DynamoDB, Lambda, IAM)
      - name: Deploy base infrastructure
        run: npx cdk deploy IAMAccessHub-Database IAMAccessHub-Cleanup IAMAccessHub-PortalRole IAMAccessHub-AppRunner-ECR --require-approval never
        working-directory: infra

      # Step 2: Build and push Docker image to ECR
      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          ECR_REPO=$(aws cloudformation describe-stacks --stack-name IAMAccessHub-AppRunner-ECR --query "Stacks[0].Outputs[?OutputKey=='ECRRepositoryUri'].OutputValue" --output text)
          echo "ECR Repo: $ECR_REPO"
          docker build -t $ECR_REPO:${{ github.sha }} -t $ECR_REPO:latest .
          docker push $ECR_REPO:${{ github.sha }}
          docker push $ECR_REPO:latest

      # Step 3: Deploy App Runner (now the image exists in ECR)
      - name: Deploy App Runner
        run: npx cdk deploy IAMAccessHub-AppRunner --require-approval never
        working-directory: infra

      # Step 4: If App Runner already exists, trigger new deployment
      - name: Trigger App Runner deployment
        run: |
          SERVICE_ARN=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='iam-access-hub'].ServiceArn" --output text)
          if [ -n "$SERVICE_ARN" ] && [ "$SERVICE_ARN" != "None" ]; then
            aws apprunner start-deployment --service-arn $SERVICE_ARN
            echo "Deployment triggered for App Runner service"
          fi
