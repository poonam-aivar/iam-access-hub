name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"
  AWS_REGION: "ap-south-1"

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy
    needs: [lint-and-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Deploy CDK infra (DynamoDB, Lambda, IAM roles, ECR)
      - name: Deploy CDK Stacks
        run: npx cdk deploy --all --require-approval never
        working-directory: infra

      # Build and push Docker image to ECR
      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          ECR_REPO=$(aws cloudformation describe-stacks --stack-name IAMAccessHub-AppRunner-ECR --query "Stacks[0].Outputs[?OutputKey=='ECRRepositoryUri'].OutputValue" --output text)
          echo "ECR Repo: $ECR_REPO"
          docker build -t $ECR_REPO:${{ github.sha }} -t $ECR_REPO:latest .
          docker push $ECR_REPO:${{ github.sha }}
          docker push $ECR_REPO:latest

      # Deploy App Runner (create if not exists, or trigger new deployment)
      - name: Deploy App Runner
        run: |
          ECR_REPO=$(aws cloudformation describe-stacks --stack-name IAMAccessHub-AppRunner-ECR --query "Stacks[0].Outputs[?OutputKey=='ECRRepositoryUri'].OutputValue" --output text)
          SERVICE_ARN=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='iam-access-hub'].ServiceArn" --output text)

          if [ -n "$SERVICE_ARN" ] && [ "$SERVICE_ARN" != "None" ] && [ "$SERVICE_ARN" != "" ]; then
            echo "App Runner service exists. Triggering new deployment..."
            aws apprunner start-deployment --service-arn $SERVICE_ARN
          else
            echo "Creating App Runner service..."
            aws apprunner create-service \
              --service-name iam-access-hub \
              --source-configuration "{
                \"AuthenticationConfiguration\": {
                  \"AccessRoleArn\": \"arn:aws:iam::368886161280:role/IAMAccessHub-AppRunnerAccess\"
                },
                \"ImageRepository\": {
                  \"ImageIdentifier\": \"${ECR_REPO}:latest\",
                  \"ImageRepositoryType\": \"ECR\",
                  \"ImageConfiguration\": {
                    \"Port\": \"8080\",
                    \"RuntimeEnvironmentVariables\": {
                      \"NEXTAUTH_SECRET\": \"k8sJ3mP9vL2xR5tN7wQ1yA4fH6dB0cE8gI3jK5lM7n\",
                      \"NEXTAUTH_URL\": \"https://placeholder.ap-south-1.awsapprunner.com\",
                      \"APP_REGION\": \"ap-south-1\",
                      \"BEDROCK_MODEL_ID\": \"anthropic.claude-3-haiku-20240307-v1:0\"
                    }
                  }
                },
                \"AutoDeploymentsEnabled\": false
              }" \
              --instance-configuration '{"Cpu": "0.25 vCPU", "Memory": "0.5 GB"}' \
              --health-check-configuration '{"Protocol": "HTTP", "Path": "/api/health", "Interval": 20, "Timeout": 5, "HealthyThreshold": 1, "UnhealthyThreshold": 5}' \
              --tags Key=project,Value=iam-access-hub Key=purpose,Value=warpspeed Key=owner,Value=poonam-aivar
          fi
